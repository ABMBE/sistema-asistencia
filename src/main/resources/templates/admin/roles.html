<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Roles</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f5f7fb;">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold">
                Gestión de Roles
            </h2>

            <p class="text-muted">
                Administración de permisos
            </p>

        </div>

        <a th:href="@{/admin/roles/nuevo}"
           class="btn btn-primary">

            Nuevo Rol

        </a>

    </div>

    <div class="card shadow border-0 rounded-4">

        <div class="card-body">

            <table class="table table-hover">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Rol</th>
                    <th>Descripción</th>
                    <th>Acciones</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="rol : ${roles}">

                    <td th:text="${rol.idRol}"></td>

                    <td th:text="${rol.nombreRol}"></td>

                    <td th:text="${rol.descripcion}"></td>

                    <td>

                        <a th:href="@{/admin/roles/editar/{id}(id=${rol.idRol})}"
                           class="btn btn-warning btn-sm">

                            Editar

                        </a>

                        <a th:href="@{/admin/roles/eliminar/{id}(id=${rol.idRol})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Eliminar rol?')">

                            Eliminar

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
