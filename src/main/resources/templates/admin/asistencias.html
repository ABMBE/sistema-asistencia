<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Asistencias</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f5f7fb;">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold">
                Gestión de Asistencias
            </h2>

            <p class="text-muted">
                Control de asistencia del personal
            </p>

        </div>

        <a th:href="@{/admin/asistencias/nuevo}"
           class="btn btn-primary">

            Nueva Asistencia

        </a>

    </div>

    <div class="card shadow border-0 rounded-4">

        <div class="card-body">

            <table class="table table-hover">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Empleado</th>
                    <th>Fecha</th>
                    <th>Hora Entrada</th>
                    <th>Hora Salida</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="a : ${asistencias}">

                    <td th:text="${a.idAsistencia}"></td>

                    <td th:text="${a.empleado.nombres}"></td>

                    <td th:text="${a.fecha}"></td>

                    <td th:text="${a.horaEntrada}"></td>

                    <td th:text="${a.horaSalida}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:text="${a.estado}">
                        </span>

                    </td>

                    <td>

                        <a th:href="@{/admin/asistencias/editar/{id}(id=${a.idAsistencia})}"
                           class="btn btn-warning btn-sm">

                            Editar

                        </a>

                        <a th:href="@{/admin/asistencias/eliminar/{id}(id=${a.idAsistencia})}"
                           class="btn btn-danger btn-sm">

                            Eliminar

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
