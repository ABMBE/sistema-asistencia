<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Formulario Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f5f7fb;">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-4">

                    <h2 class="text-center fw-bold mb-4">

                        Formulario Usuario

                    </h2>

                    <form th:action="@{/admin/usuarios/guardar}"
                          th:object="${usuario}"
                          method="post">

                        <!-- ID -->

                        <input type="hidden"
                               th:field="*{idUsuario}">

                        <!-- USERNAME -->

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{username}"
                                   required>

                        </div>

                        <!-- PASSWORD -->

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{passwordHash}"
                                   required>

                        </div>

                        <!-- EMPLEADO -->

                        <div class="mb-3">

                            <label class="form-label">
                                Empleado
                            </label>

                            <select class="form-select"
                                    th:field="*{empleado.idEmpleado}"
                                    required>

                                <option value="">
                                    Seleccione
                                </option>

                                <option th:each="emp : ${empleados}"
                                        th:value="${emp.idEmpleado}"
                                        th:text="${emp.nombre + ' ' + emp.apellido}">
                                </option>

                            </select>

                        </div>

                        <!-- ROL -->

                        <div class="mb-3">

                            <label class="form-label">
                                Rol
                            </label>

                            <select class="form-select"
                                    th:field="*{rol.idRol}"
                                    required>

                                <option value="">
                                    Seleccione
                                </option>

                                <option th:each="r : ${roles}"
                                        th:value="${r.idRol}"
                                        th:text="${r.nombreRol}">
                                </option>

                            </select>

                        </div>

                        <!-- ESTADO -->

                        <div class="form-check mb-4">

                            <input class="form-check-input"
                                   type="checkbox"
                                   th:field="*{estadoCuenta}">

                            <label class="form-check-label">
                                Activo
                            </label>

                        </div>

                        <!-- BOTONES -->

                        <div class="d-flex justify-content-between">

                            <a th:href="@{/admin/usuarios}"
                               class="btn btn-secondary">

                                Volver

                            </a>

                            <button type="submit"
                                    class="btn btn-primary">

                                Guardar Usuario

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
