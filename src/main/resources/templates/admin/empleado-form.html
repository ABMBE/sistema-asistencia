<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Empleado</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f5f7fb;">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-4">

                    <h2 class="mb-4 text-center fw-bold">

                        Registro de Empleado

                    </h2>

                    <form th:action="@{/admin/empleados/guardar}"
                          th:object="${empleado}"
                          method="post">

                        <input type="hidden"
                               th:field="*{idEmpleado}">

                        <!-- DNI -->

                        <div class="mb-3">

                            <label class="form-label">
                                DNI
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{dni}"
                                   required>

                        </div>

                        <!-- NOMBRE -->

                        <div class="mb-3">

                            <label class="form-label">
                                Nombre
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{nombre}"
                                   required>

                        </div>

                        <!-- APELLIDO -->

                        <div class="mb-3">

                            <label class="form-label">
                                Apellido
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{apellido}"
                                   required>

                        </div>

                        <!-- CORREO -->

                        <div class="mb-3">

                            <label class="form-label">
                                Correo
                            </label>

                            <input type="email"
                                   class="form-control"
                                   th:field="*{correo}">

                        </div>

                        <!-- TELEFONO -->

                        <div class="mb-3">

                            <label class="form-label">
                                Teléfono
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{telefono}">

                        </div>

                        <!-- FECHA -->

                        <div class="mb-3">

                            <label class="form-label">
                                Fecha Ingreso
                            </label>

                            <input type="date"
                                   class="form-control"
                                   th:field="*{fechaIngreso}">

                        </div>

                        <!-- AREA -->

                        <div class="mb-3">

                            <label class="form-label">
                                Área
                            </label>

                            <select class="form-select"
                                    th:field="*{area}">

                                <option value="">
                                    Seleccione
                                </option>

                                <option th:each="area : ${areas}"
                                        th:value="${area.idArea}"
                                        th:text="${area.nombreArea}">
                                </option>

                            </select>

                        </div>

                        <!-- CARGO -->

                        <div class="mb-3">

                            <label class="form-label">
                                Cargo
                            </label>

                            <select class="form-select"
                                    th:field="*{cargo}">

                                <option value="">
                                    Seleccione
                                </option>

                                <option th:each="cargo : ${cargos}"
                                        th:value="${cargo.idCargo}"
                                        th:text="${cargo.nombreCargo}">
                                </option>

                            </select>

                        </div>

                        <!-- TURNO -->

                        <div class="mb-3">

                            <label class="form-label">
                                Turno
                            </label>

                            <select class="form-select"
                                    th:field="*{turno}">

                                <option value="">
                                    Seleccione
                                </option>

                                <option th:each="turno : ${turnos}"
                                        th:value="${turno.idTurno}"
                                        th:text="${turno.nombreTurno}">
                                </option>

                            </select>

                        </div>

                        <!-- ESTADO -->

                        <div class="form-check mb-4">

                            <input class="form-check-input"
                                   type="checkbox"
                                   th:field="*{estado}">

                            <label class="form-check-label">
                                Activo
                            </label>

                        </div>

                        <!-- BOTONES -->

                        <div class="d-flex justify-content-between">

                            <a th:href="@{/admin/empleados}"
                               class="btn btn-secondary">

                                Volver

                            </a>

                            <button type="submit"
                                    class="btn btn-primary">

                                Guardar Empleado

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
