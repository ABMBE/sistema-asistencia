<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vacaciones y Licencias</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Vacaciones y Licencias</h2>
            <p class="text-muted">Gestión de permisos, vacaciones y licencias médicas.</p>
        </div>

        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
            Volver al dashboard
        </a>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-header fw-bold">
            Registrar nueva licencia
        </div>

        <div class="card-body">
            <form th:action="@{/admin/licencias/guardar}" th:object="${licencia}" method="post">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Empleado</label>
                        <select class="form-select" th:field="*{empleado}">
                            <option th:each="empleado : ${empleados}"
                                    th:value="${empleado.idEmpleado}"
                                    th:text="${empleado.nombre + ' ' + empleado.apellido}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" th:field="*{tipo}">
                            <option value="VACACIONES">Vacaciones</option>
                            <option value="LICENCIA_MEDICA">Licencia médica</option>
                            <option value="PERMISO_PERSONAL">Permiso personal</option>
                            <option value="DESCANSO_COMPENSATORIO">Descanso compensatorio</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Fecha inicio</label>
                        <input type="date" class="form-control" th:field="*{fechaInicio}">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Fecha fin</label>
                        <input type="date" class="form-control" th:field="*{fechaFin}">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Días</label>
                        <input type="number" class="form-control" th:field="*{dias}">
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label">Motivo</label>
                        <textarea class="form-control" rows="3" th:field="*{motivo}"></textarea>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary">
                    Guardar licencia
                </button>

            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header fw-bold">
            Solicitudes registradas
        </div>

        <div class="card-body">

            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>Empleado</th>
                    <th>Tipo</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Días</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="licencia : ${licencias}">
                    <td th:text="${licencia.empleado.nombre + ' ' + licencia.empleado.apellido}"></td>
                    <td th:text="${licencia.tipo}"></td>
                    <td th:text="${licencia.fechaInicio}"></td>
                    <td th:text="${licencia.fechaFin}"></td>
                    <td th:text="${licencia.dias}"></td>

                    <td>
                        <span class="badge"
                              th:classappend="${licencia.estado == 'APROBADO'} ? ' bg-success' :
                                              (${licencia.estado == 'RECHAZADO'} ? ' bg-danger' : ' bg-warning text-dark')"
                              th:text="${licencia.estado}">
                        </span>
                    </td>

                    <td>
                        <a th:href="@{/admin/licencias/aprobar/{id}(id=${licencia.idLicencia})}"
                           class="btn btn-sm btn-success">
                            Aprobar
                        </a>

                        <a th:href="@{/admin/licencias/rechazar/{id}(id=${licencia.idLicencia})}"
                           class="btn btn-sm btn-warning">
                            Rechazar
                        </a>

                        <a th:href="@{/admin/licencias/eliminar/{id}(id=${licencia.idLicencia})}"
                           class="btn btn-sm btn-danger">
                            Eliminar
                        </a>
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
